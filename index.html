<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/script.js" defer></script>
    <title>Library</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <h1 class="logo">Library</h1>
        <img id="addBook" src="./images/plus-circle.svg" alt="" />
      </div>
    </header>

    <div class="container">
      <div class="library-info">
        <div class="info">
          <h3>Books</h3>
          <span id="books">0</span>
        </div>
        <div class="info">
          <h3>Books Read</h3>
          <span id="booksRead">0</span>
        </div>
        <div class="info">
          <h3>Total Pages</h3>
          <span id="totalPages">0</span>
        </div>
        <div class="info">
          <h3>Pages Read</h3>
          <span id="pagesRead">0</span>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="grid-container"></div>
    </div>

    <div id="modal" class="modal">
      <div class="modal-content">
        <h2>Book Info</h2>
        <span class="close">&times;</span>
        <form action="#" id="bookForm">
          <div class="form-item">
            <input type="text" name="title" id="title" required />
            <label for="title">Title</label>
          </div>
          <div class="form-item">
            <input type="text" name="author" id="author" required />
            <label for="author">Author</label>
          </div>
          <div class="form-item">
            <input type="number" name="pageCount" id="pageCount" required />
            <label for="pageCount">Page Count</label>
          </div>
          <div class="form-item">
            <label for="isRead">Read:</label>
            <input type="checkbox" name="isRead" id="isRead" />
          </div>
          <button type="submit">Add Book</button>
        </form>
      </div>
    </div>
  </body>
</html>
